<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>AI Prediction</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <h1>Amazon Product Rating Predictor</h1>
    <form action="/predict" method="post">
        <p>Enter Feature Values (Separated by space):</p>
        <input type="text" name="features" placeholder="e.g. 1.2 3.4 5.6" required>
        <button type="submit">Predict</button>
    </form>
    {% if prediction_text %}
        <h3>{{ prediction_text }}</h3>
    {% endif %}
</body>
</html>
